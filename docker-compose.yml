services:
  trail:
    build: .
    image: empire-state-trail
    container_name: empire-state-trail
    # Host 8080 -> nginx 80. Browsers treat localhost as a secure context, so
    # the service worker and geolocation both work here without TLS.
    ports:
      - "8080:80"
    # The Dockerfile COPYs the shell in, so without a mount the container serves a
    # build-time snapshot and edits stay invisible until `up --build` — an easy
    # hour to lose debugging a change that was never actually served.
    #
    # Mount the DIRECTORY, never the individual files. A single-file bind mount
    # resolves to that file's inode once; editors save atomically (write temp,
    # rename), which swaps the inode, and the container then serves the original
    # for the rest of its life — silently, with no error anywhere. A directory
    # mount resolves each path at access time, so replacements are picked up.
    #
    # This puts the repo at the web root, so nginx denies dotfiles to keep .git
    # unreachable. The image stays self-contained: `docker run empire-state-trail`
    # needs no mounts.
    volumes:
      - .:/usr/share/nginx/html:ro
    restart: unless-stopped

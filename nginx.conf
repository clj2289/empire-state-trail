server {
  # Both stacks. The image's 10-listen-on-ipv6-by-default.sh helper only patches
  # the stock config, not a custom one, so without this `localhost` inside the
  # container resolves to ::1 and gets refused.
  listen       80;
  listen       [::]:80;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # MUST stay off while the app shell is bind-mounted from the host (see
  # docker-compose.yml). sendfile() goes through Docker Desktop's filesystem
  # layer, which reports a stale size after a mounted file grows — nginx then
  # serves the file truncated to its previous length. A JS file cut mid-statement
  # is a SyntaxError, so est-core.js never finishes evaluating, never assigns
  # window.TrailApp, and the whole app renders as a blank shell. Costs nothing
  # here: the payload is a handful of small static files.
  sendfile off;

  # In development the web root is the repo itself (see docker-compose.yml), so
  # keep .git and other dotfiles off the wire. No effect on the built image, which
  # only ever contains the app shell.
  location ~ /\. { deny all; }

  # est-core.js is ~90KB of mostly GPX coordinates — it compresses hard.
  gzip              on;
  gzip_min_length   512;
  gzip_types        text/css application/javascript application/json application/manifest+json image/svg+xml;

  # The shell and the worker must revalidate on every load. If they go into a
  # browser's HTTP cache, a client stays pinned to the old shell and never picks
  # up a new service worker — the classic way a PWA gets stuck on a stale build.
  location = / {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }
  location = /sw.js {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  # `types` rather than `default_type`: mime.types already maps .json to
  # application/json, and default_type only applies when nothing matched. Scoped
  # to this exact location, so no other .json is affected.
  location = /manifest.json {
    types { application/manifest+json json; }
    add_header Cache-Control "no-cache" always;
  }

  # Not content-hashed, so these revalidate too — the service worker, not the
  # HTTP cache, is what makes them fast offline.
  location ~* \.(js|css)$ {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  # Icons are stable; let them sit in the browser cache.
  location ~* \.(png|ico|svg|webp)$ {
    add_header Cache-Control "public, max-age=604800" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
